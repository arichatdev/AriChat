<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AriChat</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<div class="contatos">

<h2>💬 Contatos</h2>


<div class="contato" data-nome="Joao">
<span class="avatar online"></span>
João
</div>


<div class="contato" data-nome="Maria">
<span class="avatar ausente"></span>
Maria
</div>


<div class="contato" data-nome="Pedro">
<span class="avatar ocupado"></span>
Pedro
</div>


<div class="contato" data-nome="Ana">
<span class="avatar offline"></span>
Ana
</div>


</div>



<div class="chat" id="chat">


<div class="topo">

<h1 id="nomeContato">
💬 AriChat
</h1>


<select id="status">

<option value="online">🟢 Online</option>
<option value="ocupado">🔴 Ocupado</option>
<option value="ausente">🟡 Ausente</option>
<option value="invisivel">⚪ Invisível</option>
<option value="offline">⚫ Offline</option>

</select>


<div id="digitando">
🟢 Online
</div>


</div>



<div id="mensagens"></div>



<div class="entrada">


<button id="emoji">
😊
</button>


<input 
id="texto"
placeholder="Digite uma mensagem..."
>


<button id="enviar">
Enviar
</button>


<button id="chamar">
📳
</button>


</div>



<div id="emojis">

<span>😀</span>
<span>😂</span>
<span>😍</span>
<span>❤️</span>
<span>🔥</span>
<span>👍</span>
<span>😎</span>
<span>😢</span>
<span>😡</span>
<span>🎉</span>
<span>🤣</span>
<span>😱</span>
<span>🙏</span>
<span>🚀</span>

</div>



</div>


</div>



<script src="script.js"></script>


</body>

</html>
